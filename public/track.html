<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - Sravya Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #FFF8F0;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #c02b7d, #7d0b5a);
  color: white;
  text-align: center;
  padding: 20px;
}

header h1 { font-size: 24px; margin-bottom: 4px; }
header p  { font-size: 13px; opacity: .8; }

.back-link {
  display: inline-block;
  margin: 16px 20px;
  color: #250790;
  font-weight: 800;
  text-decoration: none;
  font-size: 14px;
}

/* SEARCH */
.search-wrap {
  max-width: 500px;
  margin: 10px auto 24px;
  padding: 0 20px;
}

.search-box { display: flex; gap: 10px; }

.search-box input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #e8d5c4;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  outline: none;
  letter-spacing: 2px;
  background: white;
}

.search-box input:focus { border-color: #c02b7d; }

.search-box button {
  background: #c02b7d;
  color: white;
  border: none;
  padding: 12px 22px;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
}

/* AUTO REFRESH */
#liveIndicator {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
  transition: color 0.3s;
}

/* RESULT */
#result {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ORDER CARD */
.order-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.order-header {
  background: linear-gradient(135deg, #c02b7d, #7d0b5a);
  color: white;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.order-header .order-id   { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
.order-header .order-date { font-size: 12px; opacity: .8; margin-top: 4px; }

.order-header .total-badge {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 8px 14px;
  text-align: center;
}

.order-header .total-badge .amt { font-size: 20px; font-weight: 900; }
.order-header .total-badge .lbl { font-size: 11px; opacity: .8; }

/* ── DELIVERY TIMER ─────────────────────────────── */
.delivery-timer {
  background: linear-gradient(135deg, #1a0a6b, #250790);
  color: white;
  padding: 18px 24px;
  text-align: center;
}

.delivery-timer .timer-label {
  font-size: 12px;
  opacity: .75;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.timer-display {
  display: flex;
  justify-content: center;
  gap: 12px;
  align-items: center;
}

.timer-box {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 10px 16px;
  min-width: 64px;
  text-align: center;
}

.timer-box .num {
  font-size: 32px;
  font-weight: 900;
  line-height: 1;
  font-family: monospace;
}

.timer-box .unit {
  font-size: 11px;
  opacity: .7;
  margin-top: 4px;
}

.timer-sep {
  font-size: 28px;
  font-weight: 900;
  opacity: .6;
  margin-bottom: 8px;
}

.timer-msg {
  font-size: 13px;
  opacity: .85;
  margin-top: 10px;
}

.delivered-banner {
  background: #16a34a;
  color: white;
  padding: 16px 24px;
  text-align: center;
  font-size: 18px;
  font-weight: 800;
}

.cancelled-banner {
  background: #dc2626;
  color: white;
  padding: 14px 24px;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
}

/* PROGRESS TRACKER */
.tracker { padding: 24px; }

.tracker-title {
  font-size: 12px;
  font-weight: 800;
  color: #888;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.steps {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
}

.steps::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 21px;
  right: 21px;
  height: 3px;
  background: #f0e8dc;
  z-index: 0;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  z-index: 1;
  flex: 1;
}

.step-circle {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 3px solid #f0e8dc;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.4s ease;
}

.step.done .step-circle {
  background: #16a34a;
  border-color: #16a34a;
  font-size: 16px;
  color: white;
}

.step.active .step-circle {
  background: #c02b7d;
  border-color: #c02b7d;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(192,43,125,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(192,43,125,0); }
}

.step-label {
  font-size: 11px;
  font-weight: 800;
  color: #bbb;
  text-align: center;
  line-height: 1.3;
  max-width: 64px;
}

.step.done   .step-label { color: #16a34a; }
.step.active .step-label { color: #c02b7d; }

/* ITEMS */
.items-section {
  border-top: 1px solid #f5ece4;
  padding: 16px 24px;
}

.items-title {
  font-size: 12px;
  font-weight: 800;
  color: #888;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.item-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f9f4f0;
  font-size: 14px;
}

.item-row:last-child { border-bottom: none; }
.item-name  { font-weight: 700; color: #333; }
.item-price { font-weight: 800; color: #c02b7d; }

/* REFRESH INFO */
.refresh-info {
  text-align: center;
  font-size: 12px;
  color: #bbb;
  padding: 12px;
  border-top: 1px solid #f5ece4;
}

/* LOADING */
.loading { text-align: center; padding: 40px; color: #888; }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #f0e0ea;
  border-top-color: #c02b7d;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: #fef2f2;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  color: #dc2626;
}

.error-box .err-icon { font-size: 36px; margin-bottom: 10px; }
.error-box p         { font-weight: 700; font-size: 15px; }
.error-box small     { font-size: 13px; color: #888; display: block; margin-top: 6px; }

.hint { text-align: center; padding: 40px 20px; color: #ccc; }
.hint .hint-icon { font-size: 48px; margin-bottom: 12px; }
.hint p { font-size: 14px; font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>🚴 Track Your Order</h1>
  <p>Live delivery status & countdown</p>
</header>

<a href="index.html" class="back-link">← Back to Menu</a>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input
      type="number"
      id="orderInput"
      placeholder="Enter Order ID e.g. 1"
      onkeydown="if(event.key==='Enter') trackOrder()"
    />
    <button onclick="trackOrder()">Track</button>
  </div>
</div>

<!-- LIVE INDICATOR -->
<p id="liveIndicator"></p>

<!-- RESULT -->
<div id="result">
  <div class="hint">
    <div class="hint-icon">🍛</div>
    <p>Enter your Order ID above to track</p>
  </div>
</div>

<script>

const API = 'http://localhost:5000';

const STATUSES   = ['Confirmed', 'Preparing', 'Out for Delivery', 'Delivered'];
const STEP_CONFIG = [
  { label: 'Order\nConfirmed', emoji: '✅', status: 'Confirmed' },
  { label: 'Preparing\nFood',  emoji: '👨‍🍳', status: 'Preparing' },
  { label: 'Out for\nDelivery',emoji: '🚴',  status: 'Out for Delivery' },
  { label: 'Delivered',        emoji: '🎉',  status: 'Delivered' },
];

// Delivery time = 40 minutes from order placement
const DELIVERY_MINUTES = 40;

let currentOrder      = null;
let timerInterval     = null;
let autoRefreshTimer  = null;
let liveCountdown     = 10;

/* ── TRACK ORDER ────────────────────────────────── */
async function trackOrder() {

  const input = document.getElementById('orderInput').value.trim();
  if (!input) { alert('Please enter your Order ID'); return; }

  document.getElementById('result').innerHTML = `
    <div class="loading"><div class="spinner"></div><p>Fetching your order...</p></div>
  `;

  await loadOrder(input);

  // Start auto-refresh every 10 seconds
  clearInterval(autoRefreshTimer);
  liveCountdown = 10;
  autoRefreshTimer = setInterval(() => silentRefresh(input), 10000);

  // Countdown display
  setInterval(() => {
    liveCountdown--;
    if (liveCountdown <= 0) liveCountdown = 10;
    const el = document.getElementById('liveIndicator');
    if (el && currentOrder &&
        currentOrder.status !== 'Delivered' &&
        currentOrder.status !== 'Cancelled') {
      el.innerText = `🔄 Status refreshes in ${liveCountdown}s`;
    }
  }, 1000);

}

/* ── LOAD ORDER FROM SERVER ─────────────────────── */
async function loadOrder(id) {
  try {
    const res  = await fetch(`${API}/track/${id}`);
    const data = await res.json();

    if (!data || data.success === false) {
      document.getElementById('result').innerHTML = `
        <div class="error-box">
          <div class="err-icon">❌</div>
          <p>Order #${id} not found</p>
          <small>Please check your Order ID and try again</small>
        </div>
      `;
      return;
    }

    currentOrder = data;
    renderOrder(data);

  } catch(err) {
    document.getElementById('result').innerHTML = `
      <div class="error-box">
        <div class="err-icon">⚠️</div>
        <p>Cannot connect to server</p>
        <small>Make sure backend is running: <strong>node server.js</strong></small>
      </div>
    `;
  }
}

/* ── SILENT REFRESH ─────────────────────────────── */
async function silentRefresh(id) {
  try {
    const res  = await fetch(`${API}/track/${id}`);
    const data = await res.json();

    if (data && data.success !== false) {
      // Only re-render if status changed
      if (!currentOrder || data.status !== currentOrder.status) {
        currentOrder = data;
        renderOrder(data);
        flashLive();
      }
      liveCountdown = 10;
    }
  } catch(err) {
    console.log("Silent refresh failed");
  }
}

/* ── FLASH LIVE INDICATOR ───────────────────────── */
function flashLive() {
  const el = document.getElementById('liveIndicator');
  if (!el) return;
  el.style.color  = "#16a34a";
  el.innerText    = "✔ Status updated!";
  setTimeout(() => { el.style.color = "#aaa"; }, 2000);
}

/* ── RENDER ORDER ───────────────────────────────── */
function renderOrder(order) {

  clearInterval(timerInterval);

  // Date
  let dateStr = '—';
  if (order.createdAt) {
    const d = new Date(order.createdAt);
    dateStr = isNaN(d) ? order.createdAt
      : d.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
  }

  // Step progress
  const currentIndex = STATUSES.indexOf(order.status);
  const isCancelled  = order.status === 'Cancelled';
  const isDelivered  = order.status === 'Delivered';

  let stepsHtml = '';
  STEP_CONFIG.forEach((step, i) => {
    let cls  = '';
    if (!isCancelled) {
      if (i < currentIndex)   cls = 'done';
      if (i === currentIndex) cls = 'active';
    }
    const icon = cls === 'done' ? '✔' : step.emoji;
    stepsHtml += `
      <div class="step ${cls}">
        <div class="step-circle">${icon}</div>
        <div class="step-label">${step.label.replace('\n','<br>')}</div>
      </div>
    `;
  });

  // Items
  let itemsHtml = '';
  (order.items || []).forEach(item => {
    const qty   = item.qty || item.quantity || 1;
    const price = item.price || 0;
    itemsHtml += `
      <div class="item-row">
        <span class="item-name">${item.name} × ${qty}</span>
        <span class="item-price">₹${price * qty}</span>
      </div>
    `;
  });

  // Timer or delivered/cancelled banner
  let timerHtml = '';

  if (isDelivered) {
    timerHtml = `
      <div class="delivered-banner">
        🎉 Order Delivered! Enjoy your meal!
      </div>
    `;
    const el = document.getElementById('liveIndicator');
    if (el) el.innerText = '';

  } else if (isCancelled) {
    timerHtml = `<div class="cancelled-banner">❌ This order has been cancelled</div>`;

  } else {
    // Calculate remaining time
    const orderedAt  = new Date(order.createdAt);
    const deliverAt  = new Date(orderedAt.getTime() + DELIVERY_MINUTES * 60 * 1000);
    const now        = new Date();
    const remaining  = Math.max(0, deliverAt - now);

    timerHtml = `
      <div class="delivery-timer">
        <div class="timer-label">⏱ Estimated Delivery In</div>
        <div class="timer-display">
          <div class="timer-box">
            <div class="num" id="timerMins">00</div>
            <div class="unit">mins</div>
          </div>
          <div class="timer-sep">:</div>
          <div class="timer-box">
            <div class="num" id="timerSecs">00</div>
            <div class="unit">secs</div>
          </div>
        </div>
        <div class="timer-msg" id="timerMsg">🚴 Your order is on the way!</div>
      </div>
    `;

    // Start countdown after render
    setTimeout(() => startCountdown(orderedAt), 100);
  }

  document.getElementById('result').innerHTML = `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">Order #${order.id}</div>
          <div class="order-date">${dateStr}</div>
        </div>
        <div class="total-badge">
          <div class="amt">₹${order.total}</div>
          <div class="lbl">Total</div>
        </div>
      </div>

      ${timerHtml}

      <div class="tracker">
        <div class="tracker-title">Order Status — ${order.status}</div>
        <div class="steps">${stepsHtml}</div>
      </div>

      <div class="items-section">
        <div class="items-title">Items Ordered</div>
        ${itemsHtml || '<p style="color:#bbb;font-size:14px;">No items found</p>'}
      </div>

      <div class="refresh-info">
        🔄 Status updates automatically every 10 seconds
      </div>
    </div>
  `;

}

/* ── COUNTDOWN TIMER ────────────────────────────── */
function startCountdown(orderedAt) {

  const deliverAt = new Date(orderedAt.getTime() + DELIVERY_MINUTES * 60 * 1000);

  function tick() {
    const now       = new Date();
    const remaining = Math.max(0, deliverAt - now);

    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    const mEl = document.getElementById('timerMins');
    const sEl = document.getElementById('timerSecs');
    const msg = document.getElementById('timerMsg');

    if (!mEl) { clearInterval(timerInterval); return; }

    mEl.innerText = String(mins).padStart(2, '0');
    sEl.innerText = String(secs).padStart(2, '0');

    if (remaining === 0) {
      if (msg) msg.innerText = '🎉 Should be arriving now!';
      clearInterval(timerInterval);
    } else if (mins < 5) {
      if (msg) msg.innerText = '🚴 Almost there!';
    } else if (mins < 15) {
      if (msg) msg.innerText = '🚴 Out for delivery!';
    } else {
      if (msg) msg.innerText = '👨‍🍳 Preparing your order...';
    }
  }

  tick();
  timerInterval = setInterval(tick, 1000);

}

/* ── AUTO TRACK FROM URL ────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  if (id) {
    document.getElementById('orderInput').value = id;
    trackOrder();
  }
});

</script>
</body>
</html>
