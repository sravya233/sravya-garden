<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - Sravya Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #FFF8F0;
  min-height: 100vh;
}

header {
  background: #c02b7d;
  color: white;
  text-align: center;
  padding: 20px;
}

header h1 { font-size: 24px; margin-bottom: 4px; }
header p  { font-size: 13px; opacity: .8; }

.back-link {
  display: inline-block;
  margin: 16px 20px;
  color: #250790;
  font-weight: 800;
  text-decoration: none;
  font-size: 14px;
}

/* SEARCH BOX */
.search-wrap {
  max-width: 500px;
  margin: 10px auto 30px;
  padding: 0 20px;
}

.search-box {
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #e8d5c4;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  outline: none;
  text-transform: uppercase;
  letter-spacing: 2px;
  background: white;
}

.search-box input:focus { border-color: #c02b7d; }

.search-box button {
  background: #c02b7d;
  color: white;
  border: none;
  padding: 12px 22px;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
}

.search-box button:hover { background: #a02368; }

/* RESULT AREA */
#result {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

/* ORDER CARD */
.order-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.order-header {
  background: linear-gradient(135deg, #c02b7d, #7d0b5a);
  color: white;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.order-header .order-id { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
.order-header .order-date { font-size: 12px; opacity: .8; margin-top: 4px; }
.order-header .total-badge {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 8px 14px;
  text-align: center;
}
.order-header .total-badge .amt { font-size: 20px; font-weight: 900; }
.order-header .total-badge .lbl { font-size: 11px; opacity: .8; }

/* PROGRESS TRACKER */
.tracker {
  padding: 28px 24px 20px;
}

.tracker-title {
  font-size: 13px;
  font-weight: 800;
  color: #888;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.steps {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
}

/* connecting line */
.steps::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  height: 3px;
  background: #f0e8dc;
  z-index: 0;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  z-index: 1;
  flex: 1;
}

.step-circle {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 3px solid #f0e8dc;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.4s ease;
}

.step.done .step-circle {
  background: #16a34a;
  border-color: #16a34a;
  font-size: 16px;
}

.step.active .step-circle {
  background: #c02b7d;
  border-color: #c02b7d;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,43,125,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(192,43,125,0); }
}

.step-label {
  font-size: 11px;
  font-weight: 800;
  color: #bbb;
  text-align: center;
  line-height: 1.3;
  max-width: 60px;
}

.step.done   .step-label { color: #16a34a; }
.step.active .step-label { color: #c02b7d; }

/* ITEMS LIST */
.items-section {
  border-top: 1px solid #f5ece4;
  padding: 16px 24px;
}

.items-title {
  font-size: 13px;
  font-weight: 800;
  color: #888;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.item-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f9f4f0;
  font-size: 14px;
}

.item-row:last-child { border-bottom: none; }
.item-name  { font-weight: 700; color: #333; }
.item-price { font-weight: 800; color: #c02b7d; }

/* CANCELLED STATE */
.cancelled-banner {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 14px 18px;
  margin: 16px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  color: #dc2626;
  font-size: 14px;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 40px;
  color: #888;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #f0e0ea;
  border-top-color: #c02b7d;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.error-box {
  background: #fef2f2;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  color: #dc2626;
}

.error-box .err-icon { font-size: 36px; margin-bottom: 10px; }
.error-box p { font-weight: 700; font-size: 15px; }
.error-box small { font-size: 13px; color: #888; display: block; margin-top: 6px; }

/* HINT */
.hint {
  text-align: center;
  padding: 40px 20px;
  color: #ccc;
}
.hint .hint-icon { font-size: 48px; margin-bottom: 12px; }
.hint p { font-size: 14px; font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>🚴 Track Your Order</h1>
  <p>Enter your Order ID to see live status</p>
</header>

<a href="index.html" class="back-link">← Back to Menu</a>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input
      type="text"
      id="orderInput"
      placeholder="Enter Order ID e.g. 3"
      onkeydown="if(event.key==='Enter') trackOrder()"
    />
    <button onclick="trackOrder()">Track</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="hint">
    <div class="hint-icon">🍛</div>
    <p>Enter your Order ID above to track your order</p>
  </div>
</div>

<script>

const STATUSES = ['Confirmed', 'Preparing', 'Out for Delivery', 'Delivered'];

const STEP_CONFIG = [
  { label: 'Order\nConfirmed', emoji: '✅', status: 'Confirmed' },
  { label: 'Preparing\nFood',  emoji: '👨‍🍳', status: 'Preparing' },
  { label: 'Out for\nDelivery',emoji: '🚴',  status: 'Out for Delivery' },
  { label: 'Delivered',        emoji: '🎉',  status: 'Delivered' },
];

async function trackOrder() {

  const input = document.getElementById('orderInput').value.trim();

  if (!input) {
    alert('Please enter your Order ID');
    return;
  }

  const result = document.getElementById('result');

  result.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Fetching your order...</p>
    </div>
  `;

  try {

    const res  = await fetch(`http://localhost:5000/track/${input}`);
    const data = await res.json();

    if (!data || data.success === false) {
      result.innerHTML = `
        <div class="error-box">
          <div class="err-icon">❌</div>
          <p>Order #${input} not found</p>
          <small>Please check your Order ID and try again</small>
        </div>
      `;
      return;
    }

    renderOrder(data);

  } catch(err) {

    result.innerHTML = `
      <div class="error-box">
        <div class="err-icon">⚠️</div>
        <p>Cannot connect to server</p>
        <small>Make sure the backend is running: <strong>node server.js</strong></small>
      </div>
    `;

  }

}

function renderOrder(order) {

  const result = document.getElementById('result');

  // Date
  let dateStr = '—';
  if (order.createdAt) {
    const d = new Date(order.createdAt);
    dateStr = isNaN(d) ? order.createdAt
      : d.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
  }

  // Current step index
  const currentIndex = STATUSES.indexOf(order.status);
  const isCancelled  = order.status === 'Cancelled';

  // Steps HTML
  let stepsHtml = '';
  STEP_CONFIG.forEach((step, i) => {
    let cls = '';
    if (!isCancelled) {
      if (i < currentIndex)  cls = 'done';
      if (i === currentIndex) cls = 'active';
    }

    const icon = (cls === 'done') ? '✔' : step.emoji;

    stepsHtml += `
      <div class="step ${cls}">
        <div class="step-circle">${icon}</div>
        <div class="step-label">${step.label.replace('\n', '<br>')}</div>
      </div>
    `;
  });

  // Items HTML
  let itemsHtml = '';
  const items = order.items || [];
  items.forEach(item => {
    const qty   = item.qty || item.quantity || 1;
    const price = item.price || 0;
    itemsHtml += `
      <div class="item-row">
        <span class="item-name">${item.name} × ${qty}</span>
        <span class="item-price">₹${price * qty}</span>
      </div>
    `;
  });

  // Cancelled banner
  const cancelledHtml = isCancelled ? `
    <div class="cancelled-banner">
      ❌ This order has been cancelled
    </div>
  ` : '';

  result.innerHTML = `
    <div class="order-card">

      <div class="order-header">
        <div>
          <div class="order-id">Order #${order.id}</div>
          <div class="order-date">${dateStr}</div>
        </div>
        <div class="total-badge">
          <div class="amt">₹${order.total}</div>
          <div class="lbl">Total</div>
        </div>
      </div>

      ${cancelledHtml}

      <div class="tracker">
        <div class="tracker-title">Order Status</div>
        <div class="steps">${stepsHtml}</div>
      </div>

      <div class="items-section">
        <div class="items-title">Items Ordered</div>
        ${itemsHtml || '<p style="color:#bbb;font-size:14px;">No items found</p>'}
      </div>

    </div>
  `;

  // Auto-refresh every 20 seconds if not delivered/cancelled
  if (order.status !== 'Delivered' && order.status !== 'Cancelled') {
    setTimeout(() => trackOrder(), 20000);
  }

}

// Auto-track if order ID in URL: track.html?id=5
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  if (id) {
    document.getElementById('orderInput').value = id;
    trackOrder();
  }
});

</script>
</body>
</html>
